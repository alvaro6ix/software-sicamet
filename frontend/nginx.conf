# SICAMET CRM — nginx config (Sprint 14-E)
# Sirve el SPA de React con fallback a index.html, compresión y headers de seguridad.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Headers de seguridad (helmet del backend ya pone los suyos para /api/*).
    # Aquí los del HTML estático.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;

    # Compresión gzip para assets de texto (Vite ya hace tree-shaking, pero
    # gzip baja un 60-70% adicional sobre HTML/JS/CSS/JSON).
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Cache largo para assets con hash en el nombre (Vite los versiona).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: cualquier ruta no encontrada va a index.html para que
    # React Router maneje la navegación cliente (/usuarios, /equipos, etc.).
    location / {
        try_files $uri $uri/ /index.html;
        # No cachear el index porque cambia con cada deploy.
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Bloquear acceso a archivos sensibles si por error se incluyeron en el build.
    location ~ /\. { deny all; access_log off; log_not_found off; }
    location ~ ~$ { deny all; access_log off; log_not_found off; }
}
