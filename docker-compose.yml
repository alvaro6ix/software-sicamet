services:
  db:
    image: mysql:8.0
    container_name: sicamet_db
    restart: always
    environment:
      - TZ=America/Mexico_City
      - MYSQL_ROOT_PASSWORD=***REDACTED***
      - MYSQL_DATABASE=sicamet_crm
    ports:
      - "3306:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend
    container_name: sicamet_backend
    restart: always
    ports:
      - "3001:3001"
    depends_on:
      - db
    environment:
      - TZ=America/Mexico_City
      - DB_HOST=db
      - DB_USER=root
      - DB_PASS=***REDACTED***
      - DB_NAME=sicamet_crm
      - NODE_ENV=development
    volumes:
      - ./backend:/app
      - /app/node_modules
      - /app/.wwebjs_auth

  frontend:
    build: ./frontend
    container_name: sicamet_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_BACKEND_URL=http://backend:3001
    volumes:
      - ./frontend:/app
      - /app/node_modules

